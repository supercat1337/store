<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Store demo – Sum</title>
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet"
        />
        <script type="importmap">
            {
                "imports": {
                    "@supercat1337/event-emitter": "../../node_modules/@supercat1337/event-emitter/index.js",
                    "@supercat1337/store": "../../dist/store.esm.js"
                }
            }
        </script>
    </head>
    <body>
        <div class="container mt-5">
            <div class="d-flex flex-column align-items-center">
                <h1 class="mb-3">a + b (debounce 0.1 second)</h1>
                <div class="mb-3">
                    <button class="btn btn-outline-secondary" id="a_dec_button">-</button>
                    <div
                        id="a_counter_value"
                        class="d-inline-block text-center"
                        style="width: 100px"
                    >
                        0
                    </div>
                    <button class="btn btn-outline-secondary" id="a_inc_button">+</button>
                </div>
                <div class="mb-3">
                    <button class="btn btn-outline-secondary" id="b_dec_button">-</button>
                    <div
                        id="b_counter_value"
                        class="d-inline-block text-center"
                        style="width: 100px"
                    >
                        0
                    </div>
                    <button class="btn btn-outline-secondary" id="b_inc_button">+</button>
                </div>
                <div>=</div>
                <div class="mb-3">
                    <div
                        id="c_counter_value"
                        class="d-inline-block text-center"
                        style="width: 100px"
                    >
                        0
                    </div>
                </div>
            </div>
        </div>
        <script type="module" src="./index.js"></script>
    </body>
</html>
